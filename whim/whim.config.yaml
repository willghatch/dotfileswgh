# This config will only work on my forked Whim that adds new commands.
#
# whim setup from source instructions:
# - Install .NET SDK 8: `winget install Microsoft.DotNet.SDK.8`
# - get Whim source code
# - `dotnet restore Whim.sln`
# - build with: `dotnet build src\Whim.Runner\Whim.Runner.csproj -c Release -p:Platform=x64 "-p:SolutionDir=$PWD\"`  Note that in Command Prompt, $PWD may not expand properly and needs to be manually expanded, and note the terminating `\` on the SolutionDir is important, and maybe needs a double slash.
# - the executable is at src\Whim.Runner\bin\Release\_target-specific-path_\publish\Whim.Runner.exe
# - run with `--dir CONFIG_DIR`, or put config dir at ~/.whim -- the restart command ALWAYS reads ~/.whim.

workspaces:
  entries:
    - name: "0"
      monitors: [0]

layout_engines:
  entries:
    - type: slice
      variant:
        type: primary_stack
    - type: focus
      maximize: false
    - type: floating

keybinds:
  entries:
    # Window focus and movement among all windows in the workspace
    - command: whim.core.focus_window_next
      keybind: Win+J
    - command: whim.core.focus_window_previous
      keybind: Win+K
    - command: whim.core.swap_window_next
      keybind: Win+Alt+J
    - command: whim.core.swap_window_previous
      keybind: Win+Alt+K

    # Directional focus/swap fallbacks for layouts that support geometry-aware movement.
    - command: whim.core.focus_window_in_direction.left
      keybind: Win+Left
    - command: whim.core.focus_window_in_direction.down
      keybind: Win+Down
    - command: whim.core.focus_window_in_direction.up
      keybind: Win+Up
    - command: whim.core.focus_window_in_direction.right
      keybind: Win+Right
    - command: whim.core.swap_window_in_direction.left
      keybind: Win+Alt+Left
    - command: whim.core.swap_window_in_direction.down
      keybind: Win+Alt+Down
    - command: whim.core.swap_window_in_direction.up
      keybind: Win+Alt+Up
    - command: whim.core.swap_window_in_direction.right
      keybind: Win+Alt+Right

    # Resize
    - command: whim.core.move_window_left_edge_left
      keybind: Win+H
    - command: whim.core.move_window_right_edge_right
      keybind: Win+L
    - command: whim.core.move_window_left_edge_right
      keybind: Win+Ctrl+H
    - command: whim.core.move_window_right_edge_left
      keybind: Win+Ctrl+L

    # Increase/decrease the number of primary windows
    - command: whim.slice_layout.primary.increase
      keybind: Win+Alt+H
    - command: whim.slice_layout.primary.decrease
      keybind: Win+Alt+L

    # Layout and window state.
    - command: whim.core.cycle_layout_engine.next
      keybind: Win+Space
    - command: whim.core.cycle_layout_engine.previous
      keybind: Win+Alt+Space
    - command: whim.core.maximize_window
      keybind: Win+F
    - command: whim.floating_window.toggle_window_floating
      keybind: Win+Ctrl+F
    - command: whim.core.minimize_window
      keybind: Win+C

    # Workspaces.
    - command: whim.core.create_workspace_on_current_monitor
      keybind: Win+G
    - command: whim.command_palette.move_window_to_workspace
      keybind: Win+Alt+G
    - command: whim.core.focus_next_workspace_on_current_monitor
      keybind: Win+W
    - command: whim.core.focus_previous_workspace_on_current_monitor
      keybind: Win+B
    - command: whim.core.move_window_to_next_workspace_on_monitor
      keybind: Win+Alt+W
    - command: whim.core.move_window_to_previous_workspace_on_monitor
      keybind: Win+Alt+B
    # Reorder the current workspace among the workspaces on this monitor (keeps focus).
    - command: whim.core.swap_workspace_order_next
      keybind: Win+Ctrl+W
    - command: whim.core.swap_workspace_order_previous
      keybind: Win+Ctrl+B
    # Pin/unpin the current workspace to the current monitor, and close it (fails if last on monitor).
    - command: whim.core.pin_workspace_to_current_monitor
      keybind: Win+Shift+G
    # - command: whim.core.unpin_workspace
    #   keybind: Win+Ctrl+G
    - command: whim.core.close_workspace_on_current_monitor
      keybind: Win+Ctrl+Alt+C

    # Monitors
    - command: whim.core.focus_next_monitor
      keybind: Win+N
    - command: whim.core.focus_previous_monitor
      keybind: Win+P
    - command: whim.core.move_window_to_next_monitor
      keybind: Win+Alt+N
    - command: whim.core.move_window_to_previous_monitor
      keybind: Win+Alt+P
    - command: whim.core.move_current_workspace_to_next_monitor
      keybind: Win+Ctrl+N
    - command: whim.core.move_current_workspace_to_previous_monitor
      keybind: Win+Ctrl+P

    # Palette/search and Whim lifecycle.
    # - command: whim.command_palette.toggle
    #   keybind: Win+R
    # - command: whim.command_palette.find_focus_window
    #   keybind: Win+V
    - command: whim.command_palette.remove_window
      keybind: Win+Alt+C
    - command: whim.core.restart_whim
      keybind: Win+Alt+R
    - command: whim.core.exit_whim
      keybind: Win+Alt+Q

  unify_key_modifiers: true

filters:
  entries: []

routers:
  entries: []
  routing_behavior: route_to_launched_workspace

plugins:
  bar:
    left_components:
      entries:
        - type: workspace_widget
    right_components:
      entries:
        - type: active_layout_widget
        - type: date_time_widget
          format: yyyy-MM-dd HH:mm

  slice_layout:
    is_enabled: true
  floating_window:
    is_enabled: true
  gaps:
    is_enabled: true
    outer_gap: 0
    inner_gap: 0
    default_outer_delta: 2
    default_inner_delta: 2
  command_palette:
    is_enabled: true
    max_height_percent: 40
    max_width_pixels: 800
    y_position_percent: 20
  focus_indicator:
    is_enabled: true
    border_size: 4
    is_fade_enabled: true
    fade_timeout: 2
    color: "#33CCFF"
  layout_preview:
    is_enabled: true
  updater:
    is_enabled: false
